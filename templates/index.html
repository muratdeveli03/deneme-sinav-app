<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Deneme Sınavı Cevap Girişi</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 20px 30px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
      width: 1200px;
      max-width: 95%;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }
    .info-group {
      display: flex;
      gap: 20px;
      margin-bottom: 25px;
      justify-content: center;
    }
    .info-group input {
      padding: 10px 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      width: 250px;
    }
    .dersler {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 15px 20px;
      flex: 1 1 250px;
      max-width: 270px;
      min-width: 250px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      height: 500px;
      overflow-y: auto;
    }
    .card h3 {
      margin: 0 0 12px 0;
      padding: 10px;
      color: white;
      border-radius: 8px;
      text-align: center;
      font-size: 20px;
      user-select: none;
    }
    .turkce h3 { background-color: #ff7675; }
    .matematik h3 { background-color: #74b9ff; }
    .fen h3 { background-color: #55efc4; color: #333; }
    .sosyal h3 { background-color: #fdcb6e; color: #333; }
    .din h3 { background-color: #a29bfe; }
    .ingilizce h3 { background-color: #fab1a0; }
    .soru {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      gap: 10px;
      font-size: 16px;
    }
    .soru label {
      width: 25px;
      user-select: none;
    }
    .soru input {
      width: 40px;
      height: 30px;
      text-align: center;
      font-weight: bold;
      font-size: 16px;
      border-radius: 6px;
      border: 1.5px solid #ccc;
      text-transform: uppercase;
    }
    .soru input:focus {
      outline: none;
      border-color: #0984e3;
      box-shadow: 0 0 5px #74b9ff;
    }
    button {
      margin: 30px auto 0 auto;
      display: block;
      padding: 12px 28px;
      font-size: 18px;
      background-color: #0984e3;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #74b9ff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Deneme Sınavı Cevap Girişi</h1>
    <form method="POST">

      <div class="info-group">
        <input type="text" name="ad" placeholder="Ad Soyad" required />
        <input type="text" name="sinif" placeholder="Sınıf" required />
        <input type="text" name="okul" placeholder="Okul" required />
      </div>

      <div class="dersler">
        {% for ders, adet in dersler.items() %}
        <div class="card {{ ders }}">
          <h3>{{ ders.title() }}</h3>
          {% for i in range(1, adet + 1) %}
            <div class="soru">
              <label for="{{ ders }}_{{ i }}">{{ i }}.</label>
              <input
                id="{{ ders }}_{{ i }}"
                name="{{ ders }}_{{ i }}"
                maxlength="1"
                pattern="[A-Da-d]"
                title="Lütfen A, B, C veya D giriniz"
                required
                autocomplete="off"
              />
            </div>
          {% endfor %}
        </div>
        {% endfor %}
      </div>

      <button type="submit">Sonuçları Göster</button>
    </form>
  </div>
</body>
</html>

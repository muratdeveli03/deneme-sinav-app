<body>

    <label>Türkçe:</label><br><input name="turkce"><br>
    <label>Matematik:</label><br><input name="matematik"><br>
    <label>Fen:</label><br><input name="fen"><br>
    <label>İngilizce:</label><br><input name="ingilizce"><br>
    <label>Sosyal Bilgiler:</label><br><input name="sosyal"><br>
    <label>Din Kültürü:</label><br><input name="din"><br><br>

    <button type="submit">Sonuçları Göster</button>
  </form>
</body>
</html>

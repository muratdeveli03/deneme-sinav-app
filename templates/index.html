<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Deneme Sınavı Cevap Girişi</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
      width: 600px;
      max-width: 95%;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }
    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
      color: #555;
    }
    input[type=text] {
      width: 100%;
      padding: 8px 10px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
      box-sizing: border-box;
    }
    button {
      margin-top: 20px;
      width: 100%;
      background-color: #0984e3;
      border: none;
      color: white;
      padding: 12px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background-color: #74b9ff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Deneme Sınavı Cevap Girişi</h1>
    <form method="POST">
      <label for="ad">Ad Soyad</label>
      <input type="text" id="ad" name="ad" required />

      <label for="sinif">Sınıf</label>
      <input type="text" id="sinif" name="sinif" required />

      <label for="okul">Okul</label>
      <input type="text" id="okul" name="okul" required />

      <!-- Buraya derslerin cevapları eklenebilir -->

      <button type="submit">Sonuçları Göster</button>
    </form>
  </div>
</body>
</html>

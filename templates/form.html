<!DOCTYPE html>
<html>
<head>
  <title>Deneme Formu</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h2>{{ student_name }}, Deneme Cevaplarını Gir</h2>
    <form method="POST">
      <div class="form-grid">
        {% for ders, adet in {
          "Türkçe": 20,
          "Matematik": 20,
          "Fen": 20,
          "İnkılap": 10,
          "Din": 10,
          "İngilizce": 10
        }.items() %}
        <div class="ders" style="border-color: {{ loop.cycle('red', 'green', 'blue', 'purple', 'orange', 'teal') }}">
          <h3>{{ ders }}</h3>
          {% for i in range(1, adet + 1) %}
            <input name="{{ ders }}_{{ i }}" placeholder="{{ i }}. soru" maxlength="1">
          {% endfor %}
        </div>
        {% endfor %}
      </div>
      <button type="submit">Gönder</button>
    </form>
  </div>
</body>
</html>

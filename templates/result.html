<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Deneme Sınavı Sonuçları</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 30px 40px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    h1 {
      margin-bottom: 25px;
      color: #333;
    }
    .info {
      font-size: 18px;
      margin-bottom: 25px;
      color: #555;
    }
    ul {
      list-style: none;
      padding: 0;
      font-size: 20px;
      color: #222;
    }
    li {
      margin-bottom: 12px;
      font-weight: 600;
    }
    .dogru {
      color: #27ae60;
    }
    .yanlis {
      color: #c0392b;
    }
    button {
      margin-top: 30px;
      padding: 12px 30px;
      font-size: 18px;
      background-color: #0984e3;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #74b9ff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Deneme Sınavı Sonuçları</h1>

    <div class="info">
      <p><strong>Ad Soyad:</strong> {{ ad }}</p>
      <p><strong>Sınıf:</strong> {{ sinif }}</p>
      <p><strong>Okul:</strong> {{ okul }}</p>
    </div>

    <ul>
      {% for ders, bilgi in sonuc.items() %}
      <li>
        <strong>{{ ders.title() }}</strong>: 
        <span class="dogru">✅ {{ bilgi.dogru }} doğru</span>, 
        <span class="yanlis">❌ {{ bilgi.yanlis }} yanlış</span>
      </li>
      {% endfor %}
    </ul>

    <form action="/">
      <button type="submit">Yeni Giriş Yap</button>
    </form>
  </div>
</body>
</html>
